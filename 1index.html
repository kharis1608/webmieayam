    body.dark .section-title { color: #FFC107; }
    .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; }
    .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.03); border: 1px solid #EEE; text-align: center; padding-bottom: 20px; }
    body.dark .card { background: #1E1E1E; border-color: #333; }
    .card img { width: 100%; height: 200px; object-fit: cover; }
    .card h3 { font-size: 16px; margin: 15px 0 5px; color: #333; }
    body.dark .card h3 { color: #FFF; }
    .card .price { color: #C62828; font-weight: 600; font-size: 15px; margin-bottom: 15px; }
    body.dark .card .price { color: #FFD54F; }
    .card button { background: #FFF3E0; color: #E65100; border: none; padding: 8px 20px; border-radius: 20px; font-weight: 600; cursor: pointer; }
    .card button:hover { background: #E65100; color: white; }
    .lihat-semua { display: block; width: 180px; margin: 30px auto 0; text-align: center; background: none; border: 2px solid #C62828; color: #C62828; padding: 10px; border-radius: 25px; font-weight: 600; cursor: pointer; }

    .toggle-dark { background: none; border: none; cursor: pointer; font-size: 18px; }

    function getMenuData() {
      // Selalu sinkronkan ke database_menu terbaru biar fitur Menu/Kasir tidak kepakai data lama.
      localStorage.setItem('database_menu', JSON.stringify(defaultMenu));
      return JSON.parse(localStorage.getItem('database_menu'));
    }

    function renderFeatured() {
      const list = getMenuData().slice(0, 3);
      const grid = document.getElementById('featured-menu');
      grid.innerHTML = '';
      list.forEach(item => {
        grid.innerHTML += `
          <div class="card">
            <img src="${item.img || 'https://images.unsplash.com/photo-1569050467447-ce54b3bbc37d?w=400&q=80'}" alt="${item.name}">
            <h3>${item.name}</h3>
            <div class="price">Rp ${item.price.toLocaleString('id-ID')}</div>
            <button onclick="window.location.href='2menu.html'">🛒 Tambah</button>
          </div>
        `;
      });
    }

    function toggleDark() {
      document.getElementById('body').classList.toggle('dark');
      localStorage.setItem('darkMode', document.getElementById('body').classList.contains('dark'));
    }

    if (localStorage.getItem('darkMode') === 'true') {
      document.getElementById('body').classList.add('dark');
    }

    renderFeatured();
